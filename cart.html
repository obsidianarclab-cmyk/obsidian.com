<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart | Obsidian Arc Lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="cart-page">

<header class="navbar">
  <div class="logo">
    Obsidian Arc<br>
    <span>LAB · EST. 2026</span>
  </div>

  <nav>
    <a href="index.html">HOME</a>
    <a href="collection.html">COLLECTION</a>
  </nav>
</header>

<section class="cart-hero">
  <p class="small">— YOUR SELECTED PIECES</p>
  <h1>Shopping Cart</h1>
  <p>Review your custom 3D printed products before checkout.</p>
</section>

<section class="cart-layout">

  <div class="cart-left">
    <div id="cartBox"></div>
  </div>

  <div class="cart-summary">
    <h2>Order Summary</h2>

    <div class="summary-row">
      <span>Subtotal</span>
      <strong id="subtotal">RM 0</strong>
    </div>

    <div class="summary-row">
      <span>Delivery</span>
      <strong>To confirm</strong>
    </div>

    <hr>

    <div class="summary-total">
      <span>Total</span>
      <strong id="total">RM 0</strong>
    </div>

    <button onclick="checkout()">CHECKOUT</button>

    <button class="whatsapp-btn" onclick="sendCartWhatsapp()">
      SEND ORDER TO WHATSAPP
    </button>
  </div>

</section>

<script src="app.js"></script>
<script>
renderCart();
</script>

</body>
</html>
